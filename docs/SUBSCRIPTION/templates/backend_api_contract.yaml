openapi: 3.0.3
info:
  title: XCPro Subscription and Provider Access API
  version: 1.1.0
paths:
  /billing/google/verify-subscription:
    post:
      summary: Verify a Google Play subscription purchase and refresh canonical XCPro entitlements.
  /me/entitlements:
    get:
      summary: Read the canonical XCPro entitlement state and linked provider states needed for access policy.
  /billing/google/rtdn:
    post:
      summary: Receive Google RTDN notifications and update server-side subscription state idempotently.
  /integrations/skysight/link:
    post:
      summary: Link a SkySight account and resolve canonical provider account state.
  /integrations/skysight/link:
    delete:
      summary: Remove the stored SkySight link and revoke linked-provider premium access in XCPro.
components:
  schemas:
    EntitlementState:
      type: object
      properties:
        tier:
          type: string
          enum: [FREE, BASIC, SOARING, XC, PRO]
        features:
          type: array
          items:
            type: string
        source:
          type: string
        expiresAtMs:
          type: integer
          format: int64
          nullable: true
        fetchedAtMs:
          type: integer
          format: int64
          nullable: true
    SkySightAccountState:
      type: string
      enum: [UNLINKED, LINKED_FREE, LINKED_PAID, LINK_ERROR, UNKNOWN]
