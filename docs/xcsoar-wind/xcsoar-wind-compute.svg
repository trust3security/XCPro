<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333" />
    </marker>
    <style><![CDATA[
      .title { font: 20px Arial, Helvetica, sans-serif; font-weight: bold; fill: #111; }
      .label { font: 14px Arial, Helvetica, sans-serif; font-weight: bold; fill: #111; }
      .text { font: 12px Arial, Helvetica, sans-serif; fill: #111; }
      .small { font: 11px Arial, Helvetica, sans-serif; fill: #111; }
      .box { fill: #f9f9f9; stroke: #333; stroke-width: 1.5; }
      .group { fill: #eef3f8; stroke: #336; stroke-width: 1; }
      .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 6 4; }
    ]]></style>
  </defs>

  <text class="title" x="20" y="30">XCSoar Wind Computation Pipeline (Compute Only)</text>

  <!-- Inputs -->
  <text class="label" x="20" y="60">Inputs</text>
  <rect class="box" x="20" y="70" width="240" height="60" rx="6" ry="6" />
  <text class="text" x="32" y="95">GPS track + ground speed</text>
  <text class="small" x="32" y="112">MoreData.track / ground_speed</text>

  <rect class="box" x="20" y="150" width="240" height="60" rx="6" ry="6" />
  <text class="text" x="32" y="175">Airspeed (TAS/IAS)</text>
  <text class="small" x="32" y="192">airspeed_available + airspeed_real</text>

  <rect class="box" x="20" y="230" width="240" height="60" rx="6" ry="6" />
  <text class="text" x="32" y="255">G-load + turn rate</text>
  <text class="small" x="32" y="272">acceleration + CirclingInfo.turn_rate</text>

  <rect class="box" x="20" y="310" width="240" height="60" rx="6" ry="6" />
  <text class="text" x="32" y="335">Circling state</text>
  <text class="small" x="32" y="352">DerivedInfo.circling</text>

  <rect class="box" x="20" y="390" width="240" height="90" rx="6" ry="6" />
  <text class="text" x="32" y="415">Wind settings + sources</text>
  <text class="small" x="32" y="432">circling / zigzag / external</text>
  <text class="small" x="32" y="449">manual wind (bearing, speed)</text>

  <!-- Compute group label -->
  <text class="label" x="280" y="70">WindComputer.Compute</text>

  <!-- CirclingWind -->
  <rect class="box" x="280" y="90" width="240" height="130" rx="6" ry="6" />
  <text class="text" x="292" y="112">CirclingWind</text>
  <text class="small" x="292" y="130">Samples track + ground speed</text>
  <text class="small" x="292" y="147">Full circle required</text>
  <text class="small" x="292" y="164">Wind = (max-min)/2</text>
  <text class="small" x="292" y="181">Dir from track at max speed</text>

  <!-- WindStore -->
  <rect class="box" x="560" y="90" width="240" height="130" rx="6" ry="6" />
  <text class="text" x="572" y="112">WindStore</text>
  <text class="small" x="572" y="130">MeasurementList weighting</text>
  <text class="small" x="572" y="147">time &lt;= 1h, alt &lt;= 1000m</text>
  <text class="small" x="572" y="164">quality (1-5) + age</text>

  <!-- WindEKFGlue -->
  <rect class="box" x="280" y="250" width="240" height="150" rx="6" ry="6" />
  <text class="text" x="292" y="272">WindEKFGlue (ZigZag)</text>
  <text class="small" x="292" y="290">Requires airspeed_real</text>
  <text class="small" x="292" y="307">Rejects circling / high turn</text>
  <text class="small" x="292" y="324">Rejects g-load &gt; 1.3 or &lt; 0.7</text>
  <text class="small" x="292" y="341">Blackout 3s after maneuvers</text>

  <!-- WindEKF -->
  <rect class="box" x="560" y="250" width="200" height="90" rx="6" ry="6" />
  <text class="text" x="572" y="272">WindEKF</text>
  <text class="small" x="572" y="290">State: wind_e, wind_n, scale</text>
  <text class="small" x="572" y="307">airspeed = scale * |gps - wind|</text>

  <!-- WindComputer.Select -->
  <rect class="box" x="860" y="170" width="260" height="140" rx="6" ry="6" />
  <text class="text" x="872" y="192">WindComputer.Select</text>
  <text class="small" x="872" y="210">Priority by recency:</text>
  <text class="small" x="872" y="227">1) estimated (circling or EKF)</text>
  <text class="small" x="872" y="244">2) external</text>
  <text class="small" x="872" y="261">3) manual</text>
  <text class="small" x="872" y="278">EKF active bypasses store</text>

  <!-- DerivedInfo -->
  <rect class="box" x="1160" y="160" width="300" height="160" rx="6" ry="6" />
  <text class="text" x="1172" y="182">DerivedInfo</text>
  <text class="small" x="1172" y="200">wind (bearing, speed)</text>
  <text class="small" x="1172" y="217">wind_source (NONE/MANUAL/CIRCLING/EKF/EXTERNAL)</text>
  <text class="small" x="1172" y="234">estimated_wind + validity</text>
  <text class="small" x="1172" y="251">head_wind = cos(delta) * speed</text>

  <!-- Arrows from inputs -->
  <line class="arrow" x1="260" y1="100" x2="280" y2="120" />
  <line class="arrow" x1="260" y1="180" x2="280" y2="280" />
  <line class="arrow" x1="260" y1="260" x2="280" y2="300" />
  <line class="arrow" x1="260" y1="340" x2="280" y2="120" />
  <line class="arrow" x1="260" y1="430" x2="860" y2="240" />

  <!-- Internal flow -->
  <line class="arrow" x1="520" y1="155" x2="560" y2="155" />
  <line class="arrow" x1="520" y1="300" x2="560" y2="295" />
  <line class="arrow" x1="660" y1="340" x2="660" y2="220" />
  <line class="arrow dashed" x1="760" y1="295" x2="860" y2="240" />
  <line class="arrow" x1="800" y1="155" x2="860" y2="240" />
  <line class="arrow" x1="1120" y1="240" x2="1160" y2="240" />

  <!-- External/manual into select -->
  <text class="small" x="740" y="130">estimated wind</text>
  <text class="small" x="760" y="320">EKF result</text>

  <!-- Labels -->
  <text class="small" x="600" y="220">SlotMeasurement</text>
  <text class="small" x="600" y="350">EKF update</text>
</svg>
