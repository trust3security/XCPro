<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1000" viewBox="0 0 1700 1000">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333" />
    </marker>
    <style><![CDATA[
      .title { font: 20px Arial, Helvetica, sans-serif; font-weight: bold; fill: #111; }
      .label { font: 14px Arial, Helvetica, sans-serif; font-weight: bold; fill: #111; }
      .text { font: 12px Arial, Helvetica, sans-serif; fill: #111; }
      .small { font: 11px Arial, Helvetica, sans-serif; fill: #111; }
      .box { fill: #f9f9f9; stroke: #333; stroke-width: 1.5; }
      .lane { fill: #eef3f8; stroke: #336; stroke-width: 1; }
      .arrow { stroke: #333; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 6 4; }
    ]]></style>
  </defs>

  <text class="title" x="20" y="30">XCSoar Wind Pipeline (Combined Overview)</text>

  <!-- Lanes -->
  <rect class="lane" x="20" y="50" width="1660" height="250" rx="8" ry="8" />
  <rect class="lane" x="20" y="330" width="1660" height="620" rx="8" ry="8" />
  <text class="label" x="30" y="75">MergeThread (fast)</text>
  <text class="label" x="30" y="355">CalculationThread (slow)</text>

  <!-- MergeThread lane -->
  <rect class="box" x="30" y="90" width="210" height="60" rx="6" ry="6" />
  <text class="text" x="42" y="115">NMEA / Sensors</text>
  <text class="small" x="42" y="132">GPS, vario, pitot, compass</text>

  <rect class="box" x="260" y="90" width="220" height="60" rx="6" ry="6" />
  <text class="text" x="272" y="115">DeviceBlackboard</text>
  <text class="small" x="272" y="132">real / replay / sim merge</text>

  <rect class="box" x="500" y="90" width="200" height="60" rx="6" ry="6" />
  <text class="text" x="512" y="115">MergeThread</text>
  <text class="small" x="512" y="132">Fill + Compute basic</text>

  <rect class="box" x="720" y="70" width="280" height="100" rx="6" ry="6" />
  <text class="text" x="732" y="95">BasicComputer</text>
  <text class="small" x="732" y="113">ComputeAirspeed / Heading</text>
  <text class="small" x="732" y="130">Energy height, GPS vario</text>
  <text class="small" x="732" y="147">Uses last DerivedInfo.wind</text>

  <rect class="box" x="1040" y="90" width="180" height="60" rx="6" ry="6" />
  <text class="text" x="1052" y="115">MoreData</text>
  <text class="small" x="1052" y="132">Inputs for calculations</text>

  <!-- CalculationThread lane -->
  <rect class="box" x="30" y="360" width="260" height="70" rx="6" ry="6" />
  <text class="text" x="42" y="385">CalculationThread</text>
  <text class="small" x="42" y="402">Reads MoreData + settings</text>

  <rect class="box" x="320" y="360" width="280" height="70" rx="6" ry="6" />
  <text class="text" x="332" y="385">GlideComputer.ProcessGPS</text>
  <text class="small" x="332" y="402">Calls AirData.ProcessVertical</text>

  <rect class="box" x="640" y="360" width="300" height="70" rx="6" ry="6" />
  <text class="text" x="652" y="385">AirData.ProcessVertical</text>
  <text class="small" x="652" y="402">Circling + Wind + metrics</text>

  <rect class="box" x="640" y="460" width="200" height="60" rx="6" ry="6" />
  <text class="text" x="652" y="485">CirclingComputer</text>
  <text class="small" x="652" y="502">turn rate, circling state</text>

  <!-- WindComputer.Compute group -->
  <rect class="box" x="980" y="340" width="380" height="200" rx="8" ry="8" />
  <text class="text" x="992" y="362">WindComputer.Compute</text>

  <rect class="box" x="1000" y="370" width="160" height="70" rx="6" ry="6" />
  <text class="small" x="1012" y="392">CirclingWind</text>
  <text class="small" x="1012" y="409">GPS circle fit</text>

  <rect class="box" x="1170" y="370" width="170" height="70" rx="6" ry="6" />
  <text class="small" x="1182" y="392">WindStore</text>
  <text class="small" x="1182" y="409">weighted by time/alt/quality</text>

  <rect class="box" x="1000" y="450" width="160" height="70" rx="6" ry="6" />
  <text class="small" x="1012" y="472">WindEKFGlue</text>
  <text class="small" x="1012" y="489">gating + blackout</text>

  <rect class="box" x="1170" y="450" width="170" height="70" rx="6" ry="6" />
  <text class="small" x="1182" y="472">WindEKF</text>
  <text class="small" x="1182" y="489">wind_e, wind_n, scale</text>

  <rect class="box" x="980" y="560" width="260" height="80" rx="6" ry="6" />
  <text class="text" x="992" y="585">WindComputer.Select</text>
  <text class="small" x="992" y="602">estimated vs external vs manual</text>
  <text class="small" x="992" y="619">EKF may bypass store for selection</text>

  <rect class="box" x="1260" y="560" width="200" height="80" rx="6" ry="6" />
  <text class="text" x="1272" y="585">DerivedInfo.wind</text>
  <text class="small" x="1272" y="602">wind_source + head_wind</text>

  <rect class="box" x="1260" y="680" width="200" height="90" rx="6" ry="6" />
  <text class="text" x="1272" y="705">UI / Outputs</text>
  <text class="small" x="1272" y="722">Wind arrow, wind chart</text>
  <text class="small" x="1272" y="739">InfoBoxes, Lua, alerts</text>

  <!-- Arrows in MergeThread lane -->
  <line class="arrow" x1="240" y1="120" x2="260" y2="120" />
  <line class="arrow" x1="480" y1="120" x2="500" y2="120" />
  <line class="arrow" x1="700" y1="120" x2="720" y2="120" />
  <line class="arrow" x1="1000" y1="120" x2="1040" y2="120" />

  <!-- Down to calculation thread -->
  <line class="arrow" x1="1130" y1="150" x2="1130" y2="360" />
  <line class="arrow" x1="1130" y1="360" x2="290" y2="395" />

  <!-- Calculation flow -->
  <line class="arrow" x1="290" y1="395" x2="320" y2="395" />
  <line class="arrow" x1="600" y1="395" x2="640" y2="395" />
  <line class="arrow" x1="940" y1="395" x2="980" y2="395" />

  <!-- CirclingComputer to WindComputer -->
  <line class="arrow" x1="840" y1="490" x2="1000" y2="405" />

  <!-- WindCompute internals -->
  <line class="arrow" x1="1160" y1="405" x2="1170" y2="405" />
  <line class="arrow" x1="1160" y1="485" x2="1170" y2="485" />
  <line class="arrow" x1="1255" y1="440" x2="1110" y2="560" />
  <line class="arrow dashed" x1="1255" y1="485" x2="1110" y2="560" />

  <!-- Select to DerivedInfo to UI -->
  <line class="arrow" x1="1240" y1="600" x2="1260" y2="600" />
  <line class="arrow" x1="1360" y1="640" x2="1360" y2="680" />

  <!-- DerivedInfo wind feeds BasicComputer (fallback) -->
  <line class="arrow dashed" x1="1260" y1="600" x2="720" y2="120" />
  <text class="small" x="760" y="550">wind used for airspeed/heading fallback</text>
</svg>
