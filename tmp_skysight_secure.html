        }

        #loading-screen > div {

            height: 12rem;
            position: absolute;
            top: 50%;
            left: 50%;
            margin: -6rem 0 0 -6rem;
            text-align: center"
        }

        #loading-screen img {
            display: block;
            width: 100%;
            height: auto;
        }

        #loading-screen .bar {
            width: 100%;
            height: 0.5rem;
            background-color: #005c76;
            border-radius: 0.25rem;
            margin: 1rem 0 3rem 0;
        }

        #loading-screen .bar .fill {
            height: 0.5rem;
            width: 1%;
            background-color: white;
            border-radius: 0.25rem;
            transition: 0.5s linear width;
        }

        #loading-screen p {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            display: block;
            text-align: center;
            color: #fff;

    <script>
      // loading screen
      const fill = document.querySelector('#loading-screen .bar .fill')
      const timeout = setTimeout(() => (fill.style.width = '20%'), 300)

      document.addEventListener('pageload', e => {
        clearTimeout(timeout)
        fill.style.width = e.detail.progress + '%'
        if (e.detail.progress === 100) {
          setTimeout(() => document.querySelector('#loading-screen').remove(), 100)
        }
      })
    </script>
